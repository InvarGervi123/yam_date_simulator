<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ים דייט סימולטור</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="game">
    <button id="soundToggle" aria-label="השתק מוזיקה">🔇</button>
    <div id="fallbackBg"></div>
    <img id="background" alt="רקע" />
    <img id="character" alt="ים" />

    <div id="choices"></div>

    <section id="dialogBox">
      <div id="speaker"></div>
      <div id="text">טוען...</div>
      <button id="nextBtn">המשך</button>
    </section>

    <!-- Minigame Overlay -->
    <div id="minigameOverlay" style="display: none;">
      <div id="minigameBox">
        <h3 id="minigameTitle">מיני משחק</h3>
        <p id="minigameInstruction">הוראות משחק</p>
        <div id="minigameVisual"></div>
        <button id="minigameBtn">לחץ/י כאן</button>
      </div>
    </div>
  </main>

  <audio id="music" loop preload="auto"></audio>
  <audio id="sfx" preload="auto"></audio>

  <script src="story.js"></script>
  <script src="game.js"></script>
</body>
</html>
